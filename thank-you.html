<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Sixty Deuce Design</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="images/webclip.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .thankyou {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
    }

    .thankyou__inner {
      max-width: 32rem;
    }

    .thankyou__icon {
      font-size: 4rem;
      color: var(--color-accent);
      margin-bottom: 1.5rem;
    }

    .thankyou__heading {
      font-family: var(--font-heading);
      font-size: 2.75rem;
      color: var(--color-primary);
      margin: 0 0 1rem;
    }

    .thankyou__text {
      color: var(--color-text-muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <!-- NAV MOUNT: injected by js/components.js -->
  <div id="nav-mount"></div>

  <main id="main-content">

    <!-- THANK YOU -->
    <section class="thankyou" aria-labelledby="thankyou-heading">
      <div class="thankyou__inner">
        <span class="material-symbols-outlined thankyou__icon" aria-hidden="true">check_circle</span>
        <h1 id="thankyou-heading" class="thankyou__heading">Message Received</h1>
        <p class="thankyou__text">Thanks for reaching out. We'll review your message and get back to you within one business day.</p>
        <a href="/" class="btn btn--primary">Back to Home</a>
      </div>
    </section>

  </main>

  <!-- FOOTER MOUNT: injected by js/components.js -->
  <div id="footer-mount"></div>

  <script src="js/components.js"></script>

</body>
</html>
